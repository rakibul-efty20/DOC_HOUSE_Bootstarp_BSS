<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc House</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark pt-3 pb-3 fixed-top" style="background-color: #07332f; z-index: 1050; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="img/logo.png" alt="Doc House Logo" height="40">
            </a>
            <button class="navbar-toggler shadow-none border-0" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav gap-lg-4 mt-3 mt-lg-0">
                    <li class="nav-item"><a class="nav-link active-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link muted-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link muted-link" href="#">Appointment</a></li>
                    <li class="nav-item"><a class="nav-link muted-link" href="#">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="hero-section text-white position-relative overflow-hidden">
        <img src="img/Ellipse 1.png"       class="vec vec-circle"  alt="">
        <img src="img/half_pill_vector.png" class="half-pill" alt="">
        <img src="img/pill_1_vector.png"    class="vec vec-pill-1"  alt="">
        <img src="img/pill_2_vector.png"    class="vec vec-pill-2"  alt="">

        <div class="container position-relative z-1">

            <div class="row align-items-center hero-body">

                <div class="col-lg-6 text-center text-lg-start">
                    <div class="pe-lg-5">
                        <h1 class="display-4 fw-bold mb-4 lh-sm">
                            Your Best Medical<br>Help Center
                        </h1>
                        <p class="fs-5 mb-5 hero-sub mx-auto mx-lg-0">
                            Lorem Ipsum is simply dummy text they are printing typesetting
                            has been the industry's standard.
                        </p>
                        <a href="#" class="btn btn-custom px-5 py-3 fw-bold rounded-3">
                            All Service
                        </a>
                    </div>
                </div>

                <div class="col-lg-6 mt-5 mt-lg-0">
                    <div class="gallery-wrapper mx-auto">

                        <div class="dot-grid"></div>

                        <div class="doc-frame doc-1">
                            <div class="img-mask">
                                <img src="img/doc1.jpg" alt="Doctor 1">
                            </div>
                        </div>

                        <div class="doc-frame doc-2">
                            <div class="img-mask">
                                <img src="img/doc2.jpg" alt="Doctor 2">
                            </div>
                        </div>

                        <div class="doc-frame doc-3">
                            <div class="img-mask">
                                <img src="img/doc3.jpg" alt="Doctor 3">
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
